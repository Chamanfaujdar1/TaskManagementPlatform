spring.application.name=flowboard-web
server.port=8080

# JWT
jwt.secret=flowboard_secret_key_must_be_at_least_256_bits_long_for_security
jwt.expiration=86400000

# Service URLs
auth.service.url=http://localhost:8081
workspace.service.url=http://localhost:8082
board.service.url=http://localhost:8083
list.service.url=http://localhost:8084
card.service.url=http://localhost:8085
comment.service.url=http://localhost:8086
label.service.url=http://localhost:8087
notification.service.url=http://localhost:8088

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Disable JPA autoconfiguration (flowboard-web has no database)
spring.autoconfigure.exclude=org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration,org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,org.springframework.boot.jdbc.autoconfigure.DataSourceTransactionManagerAutoConfiguration
