server:
  port: 8888

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**

        - id: workspace-service
          uri: lb://workspace-service
          predicates:
            - Path=/api/v1/workspaces/**, /api/v1/reports/**

        - id: board-service
          uri: lb://board-service
          predicates:
            - Path=/api/v1/boards/**

        - id: list-service
          uri: lb://list-service
          predicates:
            - Path=/api/v1/lists/**

        - id: card-service
          uri: lb://card-service
          predicates:
            - Path=/api/v1/cards/**

        - id: comment-service
          uri: lb://comment-service
          predicates:
            - Path=/api/v1/comments/**, /api/v1/attachments/**

        - id: label-service
          uri: lb://label-service
          predicates:
            - Path=/api/v1/labels/**, /api/v1/checklists/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
