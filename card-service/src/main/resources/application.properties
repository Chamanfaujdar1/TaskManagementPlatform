spring.application.name=card-service
server.port=8085

spring.datasource.url=jdbc:mysql://localhost:3306/flowboard_card
spring.datasource.username=root
spring.datasource.password=Ch@m@n123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

jwt.secret=flowboard_secret_key_must_be_at_least_256_bits_long_for_security
jwt.expiration=86400000

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Notification Service URL
notification.service.url=http://localhost:8088

# Auth Service URL
auth.service.url=http://localhost:8081

# Elasticsearch Configuration
spring.elasticsearch.uris=http://localhost:9200
spring.data.elasticsearch.repositories.enabled=false
