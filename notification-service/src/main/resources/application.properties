spring.application.name=notification-service
server.port=8088

spring.datasource.url=jdbc:mysql://localhost:3306/flowboard_notification
spring.datasource.username=root
spring.datasource.password=Ch@m@n123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

jwt.secret=flowboard_secret_key_must_be_at_least_256_bits_long_for_security
jwt.expiration=86400000

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Auth Service URL for REST Template
auth.service.url=http://localhost:8081

# Mailtrap SMTP Configuration
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=mailtrap_user
spring.mail.password=mailtrap_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
